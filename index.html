<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kristine Stefanija</title>
  <meta name="description" content="Artist painting and launching art drops.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #1E7FFF;
      --white: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Poppins", sans-serif;
      background-color: #fffeea;
      color: var(--blue);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem;
      font-weight: 700;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
      max-width: 28rem;
      width: 100%;
      text-align: center;
    }

    .logo {
      width: 280px;
      height: auto;
    }

    .emojis {
      font-size: 1.5rem;
      letter-spacing: 0.5em;
    }

    .main-text {
      font-weight: 700;
      text-transform: uppercase;
      line-height: 1.625;
      font-size: 0.875rem;
    }

    @media (min-width: 768px) {
      .main-text {
        font-size: 1rem;
      }
    }

    .instagram-link {
      font-weight: 700;
      text-transform: uppercase;
      text-decoration: underline;
      text-underline-offset: 4px;
      font-size: 0.875rem;
      color: var(--blue);
    }

    .signup-form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      width: 100%;
    }

    @media (min-width: 640px) {
      .signup-form {
        flex-direction: row;
        width: auto;
      }
    }

    .signup-form input {
      width: 100%;
      padding: 0.5rem 1rem;
      font-family: "Poppins", sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.875rem;
      background: transparent;
      border: 2px solid var(--blue);
      border-radius: 9999px;
      color: var(--blue);
      outline: none;
    }

    @media (min-width: 640px) {
      .signup-form input {
        width: 16rem;
      }
    }

    .signup-form input::placeholder {
      color: var(--blue);
      opacity: 0.6;
    }

    .signup-form button {
      padding: 0.5rem 1.5rem;
      font-family: "Poppins", sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.875rem;
      background: var(--blue);
      color: var(--white);
      border: 2px solid var(--blue);
      border-radius: 9999px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .signup-form button:hover {
      opacity: 0.9;
    }

    .confirmation {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      text-align: center;
    }

    .confirmation h2 {
      font-weight: 700;
      text-transform: uppercase;
      font-size: 2rem;
      margin: 0;
    }

    .confirmation p {
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.875rem;
      line-height: 1.625;
      max-width: 24rem;
    }

    .confirmation-emoji {
      font-size: 2rem;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="logo.png" alt="Kristine Stefanija" class="logo">

    <div class="emojis">🧿🧿🧿</div>

    <p class="main-text">
      I'M KRISTINE AND I'M CURRENTLY PAINTING! BE THE FIRST ONE TO FIND OUT WHEN I LAUNCH MY NEXT ART DROP.
    </p>

    <a href="https://www.instagram.com/kristinestefanija/" target="_blank" rel="noopener noreferrer" class="instagram-link">
      INSTAGRAM
    </a>

    <div class="confirmation hidden" id="confirmation">
      <div class="confirmation-emoji">🧿</div>
      <h2>YOU'RE IN!</h2>
    </div>

    <form class="signup-form" id="signup-form" name="art-signup" method="POST" netlify>
      <input type="email" name="email" placeholder="EMAIL ADDRESS" required>
      <button type="submit">NOTIFY ME</button>
    </form>
  </div>

  <script>
    document.getElementById('signup-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      const email = this.querySelector('input[name="email"]').value;
      const form = this;

      try {
        await fetch('/.netlify/functions/send-welcome-email', {
          method: 'POST',
          body: JSON.stringify({ email }),
          headers: { 'Content-Type': 'application/json' }
        });
      } catch (error) {
        console.error('Error sending email:', error);
      }

      try {
        const formData = new FormData(form);
        await fetch(form.getAttribute('action') || '/', {
          method: 'POST',
          body: formData
        });
      } catch (error) {
        console.error('Error submitting form:', error);
      }

      setTimeout(() => {
        document.getElementById('signup-form').classList.add('hidden');
        document.getElementById('confirmation').classList.remove('hidden');
      }, 300);
    });
  </script>
</body>
</html>
